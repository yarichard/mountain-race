name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mountain-race .

      - name: Export image
        run: docker save mountain-race | gzip > /tmp/mountain-race.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/mountain-race.tar.gz
          retention-days: 1

  unit-tests-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

  unit-tests-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm to match devcontainer
        run: npm install -g npm@11

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        run: npm test -- --ci

  playwright:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/mountain-race.tar.gz

      - name: Create .env file
        run: |
          echo "METEOFRANCE_USER=${{ secrets.METEOFRANCE_USER }}" >> .env
          echo "METEOFRANCE_PASS=${{ secrets.METEOFRANCE_PASS }}" >> .env

      - name: Install Playwright dependencies
        working-directory: test
        run: npm ci

      - name: Run Playwright tests
        working-directory: test
        run: docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from playwright

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report/
          retention-days: 7
