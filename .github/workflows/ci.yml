name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mountain-race .

      - name: Export image
        run: docker save mountain-race | gzip > /tmp/mountain-race.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/mountain-race.tar.gz
          retention-days: 1

  push:
    name: Push Docker image to AWS ECR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC
    steps:
      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/mountain-race.tar.gz

      - name: Set Docker tag
        id: docker_tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="latest"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC AssumeRole)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/GitHubActionECRPushRoleForMountainRace
          aws-region: eu-west-3

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag Docker image for ECR
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="mountain-race"
          docker tag mountain-race $ECR_REGISTRY/$ECR_REPO:${{ steps.docker_tag.outputs.tag }}

      - name: Push Docker image to ECR
        run: |
          ECR_REGISTRY="${{ steps.login-ecr.outputs.registry }}"
          ECR_REPO="mountain-race"
          docker push $ECR_REGISTRY/$ECR_REPO:${{ steps.docker_tag.outputs.tag }}

  unit-tests-backend:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: backend/go.sum

      - name: Run Go tests
        working-directory: backend
        run: go test ./...

  unit-tests-frontend:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Upgrade npm to match devcontainer
        run: npm install -g npm@11

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Jest tests
        working-directory: frontend
        run: npm test -- --ci

  playwright:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load < /tmp/mountain-race.tar.gz

      - name: Create .env file
        run: |
          echo "METEOFRANCE_USER=${{ secrets.METEOFRANCE_USER }}" >> .env
          echo "METEOFRANCE_PASS=${{ secrets.METEOFRANCE_PASS }}" >> .env

      - name: Install Playwright dependencies
        working-directory: test
        run: npm ci

      - name: Run Playwright tests
        working-directory: test
        run: docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from playwright

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report/
          retention-days: 7
